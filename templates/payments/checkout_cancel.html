{% extends 'base.html' %}
{% block title %}Paiement annulé — DECEL{% endblock %}

{% block content %}
<div class="cancel-container">
    <div class="card cancel-card text-center">
        <div class="card-body">
            <div class="mb-4">
                <i class="fas fa-times-circle" style="font-size: 4rem; color: var(--danger-color);"></i>
            </div>
            <h2 class="mb-3">Paiement annulé</h2>
            <p class="text-secondary mb-4">Votre paiement a été annulé. Aucun montant n'a été débité et votre solde DC est inchangé.</p>
            <div class="actions">
                <a href="{% url 'payments:packs' %}" class="btn btn-primary me-2">
                    <i class="fas fa-redo me-2"></i>Réessayer
                </a>
                <a href="{% url 'dashboard' %}" class="btn btn-secondary">
                    <i class="fas fa-home me-2"></i>Accueil
                </a>
            </div>
        </div>
    </div>
</div>

<style>
    .cancel-container { display: flex; justify-content: center; align-items: center; min-height: 60vh; }
    .cancel-card { max-width: 420px; width: 100%; border-radius: var(--radius-xl); box-shadow: var(--shadow-xl); border: 1px solid var(--border-color); }
    .card-body { padding: 2.5rem; background: var(--card-bg); border-radius: var(--radius-xl); }
    .btn { padding: 0.6rem 1.4rem; border-radius: var(--radius-md); font-weight: 600; cursor: pointer; border: none; text-decoration: none; display: inline-block; }
    .btn-primary { background: var(--primary-color); color: white; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-secondary { background: var(--light-bg); color: var(--text-primary); border: 1px solid var(--border-color); }
    .mb-3 { margin-bottom: 1rem; }
    .mb-4 { margin-bottom: 1.5rem; }
    .me-2 { margin-right: 0.5rem; }
    .text-center { text-align: center; }
    .text-secondary { color: var(--text-secondary) !important; }
</style>
{% endblock %}
